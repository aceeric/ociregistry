apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ociregistry.fullname" . }}
  labels:
    {{- include "ociregistry.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ociregistry.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ociregistry.labels" . | nindent 8 }}
	      {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ociregistry.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        command:
        - /ociregistry/server
        args:
        {{- if .Values.serverConfig.config }}
        - --config-file
        - {{ .Values.serverConfig.mountPath }}/registry-config.yaml
        {{- end }}
        - serve
        {{- if or .Values.health.port .Values.serverConfig.config.health }}
        - --health
        - {{ .Values.health.port | default .Values.serverConfig.config.health | quote }}
        {{- end }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: {{ include "ociregistry.image" (dict "img" .Values.image.ociregistry) }}
        imagePullPolicy: {{ .Values.image.ociregistry.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        {{- if or .Values.health.port .Values.serverConfig.config.health }}
        - name: health
          containerPort: {{ .Values.health.port | default .Values.serverConfig.config.health }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: health
        readinessProbe:
          httpGet:
            path: /health
            port: health
        {{- end }}
        resources:
        {{- toYaml .Values.resources | nindent 10 }}
        {{- with .Values.volumeMounts }}
        volumeMounts:
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.serverConfig.config }}
        - name: config
          mountPath: {{ .Values.serverConfig.mountPath | default "/var/ociregistry/config"}}
          readOnly: true
        {{- end }}
        {{- if .Values.serverTls.enabled }}
        - name: server-tls
          mountPath: /etc/pki/ociregistry
          readOnly: true
        {{- end }}
      volumes:
      {{- if .Values.volumes }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- end }}
      {{- if .Values.serverTls.enabled }}
      - name: server-tls
        secret:
          secretName: {{ include "ociregistry.fullname" . }}-tls
      {{- end }}
      {{- if .Values.persistence.hostPath.enabled }}
      - name: images
        hostPath:
          type: {{ .Values.persistence.hostPath.type }}
          path: {{ .Values.persistence.hostPath.path }}
      {{- end }}
      {{- if .Values.persistence.emptyDir.enabled }}
      - name: images
        emptyDir:
          sizeLimit: {{ .Values.persistence.emptyDir.sizeLimit }}
      {{- end }}
      {{- if .Values.persistence.persistentVolumeClaim.enabled }}
      - name: images
        persistentVolumeClaim:
          {{- if .Values.persistence.persistentVolumeClaim.existingClaimName }}
          claimName: {{ .Values.persistence.persistentVolumeClaim.existingClaimName }}
          {{- else }}
          claimName: {{ include "ociregistry.fullname" . }}
          {{- end }}
      {{- end }}
      {{- if .Values.serverConfig.config }}
      - name: config
        configMap:
          name: {{ include "ociregistry.fullname" . }}-config
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
